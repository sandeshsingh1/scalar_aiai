services:
  - type: web
    name: flipkart-clone-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace server
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PGSSL
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: orders@flipkartclone.dev
